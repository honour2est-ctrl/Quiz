<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English Grammar Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --primary: #1a1a2e;
    --accent: #c0392b;
    --accent-light: #fdf1f0;
    --text: #1a1a2e;
    --muted: #7a7a8c;
    --border: #e5e2db;
    --correct: #1e7e5a;
    --correct-bg: #edfaf4;
    --wrong: #c0392b;
    --wrong-bg: #fdf1f0;
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  /* ── SCREEN BASE ── */
  .screen { display: none; animation: fadeUp 0.4s ease both; }
  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER STRIP ── */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .brand-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    letter-spacing: 0.04em;
    color: var(--muted);
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 40px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  }

  /* ── START SCREEN ── */
  .start-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .start-title em { font-style: italic; color: var(--accent); }
  .start-meta {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
    display: flex;
    gap: 20px;
  }
  .start-meta span { display: flex; align-items: center; gap: 6px; }
  .start-meta svg { width: 14px; height: 14px; }

  .label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .name-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 28px;
  }
  .name-input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { background: #2e2e50; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { background: #bbb; cursor: not-allowed; }

  /* ── QUIZ SCREEN ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .progress-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .timer-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--primary);
    color: #fff;
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    transition: background 0.3s;
  }
  .timer-badge.urgent { background: var(--accent); }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.3s ease;
  }

  .question-num {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .question-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .options-grid {
    display: grid;
    gap: 10px;
  }
  .option-btn {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s ease;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: #fff;
  }
  .option-letter {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .option-btn.selected {
    border-color: var(--primary);
    background: #fff;
  }
  .option-btn.selected .option-letter {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option-btn.correct .option-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option-btn.wrong .option-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }
  .option-btn:disabled { cursor: default; }

  .quiz-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .answered-count {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .btn-next {
    padding: 12px 28px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, background 0.2s;
  }
  .btn-next.visible { opacity: 1; pointer-events: all; }
  .btn-next:hover { background: #2e2e50; }

  /* ── RESULT SCREEN ── */
  .result-name {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .result-headline {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1.2;
    margin-bottom: 28px;
  }
  .score-block {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 28px;
    background: var(--primary);
    border-radius: var(--radius);
    color: #fff;
    margin-bottom: 28px;
  }
  .score-big {
    font-family: 'DM Serif Display', serif;
    font-size: 3.5rem;
    line-height: 1;
  }
  .score-divider { color: rgba(255,255,255,0.3); font-size: 2rem; }
  .score-right { display: flex; flex-direction: column; gap: 4px; }
  .score-pct {
    font-size: 1.5rem;
    font-weight: 700;
  }
  .score-msg { font-size: 0.85rem; opacity: 0.7; }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-box {
    padding: 16px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .stat-val { font-size: 1.3rem; font-weight: 700; }
  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }

  .review-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    margin-bottom: 16px;
    margin-top: 12px;
  }
  .review-item {
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 10px;
    font-size: 0.88rem;
  }
  .review-item.r-correct { border-color: var(--correct); background: var(--correct-bg); }
  .review-item.r-wrong   { border-color: var(--wrong);   background: var(--wrong-bg);   }
  .review-q { font-weight: 600; margin-bottom: 6px; }
  .review-detail { color: var(--muted); }
  .review-detail span { font-weight: 600; }
  .review-detail .c { color: var(--correct); }
  .review-detail .w { color: var(--wrong); }

  .btn-restart {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: var(--bg);
    color: var(--primary);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-restart:hover { background: var(--surface); border-color: var(--primary); }

  @media (max-width: 500px) {
    .card { padding: 24px 20px; }
    .start-title { font-size: 1.7rem; }
    .question-text { font-size: 1.15rem; }
    .score-big { font-size: 2.8rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- START SCREEN -->
  <div class="screen active" id="startScreen">
    <div class="brand"><div class="brand-dot"></div><span class="brand-name">Grammar Assessment</span></div>
    <div class="card">
      <h1 class="start-title">English <em>Grammar</em><br>Quiz</h1>
      <div class="start-meta">
        <span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          25 minutes
        </span>
        <span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          50 questions
        </span>
      </div>
      <div class="label">Your Name</div>
      <input class="name-input" id="nameInput" type="text" placeholder="Enter your full name…" />
      <button class="btn-primary" id="startBtn" onclick="startQuiz()">Begin Quiz →</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quizScreen">
    <div class="brand"><div class="brand-dot"></div><span class="brand-name">Grammar Assessment</span></div>
    <div class="card">
      <div class="quiz-header">
        <span class="progress-label" id="progressLabel">Question 1 of 50</span>
        <div class="timer-badge" id="timerBadge">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="timerDisplay">25:00</span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:2%"></div>
      </div>
      <div class="question-num" id="questionNum">Q1</div>
      <p class="question-text" id="questionText"></p>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="quiz-footer">
        <span class="answered-count" id="answeredCount">0 of 50 answered</span>
        <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="resultScreen">
    <div class="brand"><div class="brand-dot"></div><span class="brand-name">Grammar Assessment</span></div>
    <div class="card">
      <p class="result-name" id="resultName"></p>
      <h2 class="result-headline" id="resultHeadline"></h2>
      <div class="score-block">
        <div class="score-big" id="scoreBig"></div>
        <div class="score-divider">/</div>
        <div class="score-right">
          <div class="score-pct" id="scorePct"></div>
          <div class="score-msg" id="scoreMsg"></div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Correct</div>
          <div class="stat-val green" id="statCorrect">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Wrong</div>
          <div class="stat-val red" id="statWrong">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Skipped</div>
          <div class="stat-val" id="statSkipped">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Time Taken</div>
          <div class="stat-val" id="statTime">—</div>
        </div>
      </div>
      <h3 class="review-title">Answer Review</h3>
      <div id="reviewList"></div>
      <button class="btn-restart" onclick="restartQuiz()">↩ Restart Quiz</button>
    </div>
  </div>

</div>

<script>
const QUESTIONS = [
  { q: "The committee ______ decided to postpone the meeting until further notice.", options: ["have","are","has","were"], answer: 2 },
  { q: "If I ______ the opportunity, I would travel abroad for further studies.", options: ["have","had","have had","having"], answer: 1 },
  { q: "The boy ran ______ than all his classmates during the competition.", options: ["fast","faster","fastest","more fast"], answer: 1 },
  { q: "The teacher advised that the assignment ______ before Monday.", options: ["completes","complete","completed","completing"], answer: 1 },
  { q: "Each of the candidates ______ expected to arrive early.", options: ["are","were","is","have"], answer: 2 },
  { q: "She has been studying for the examination ______ morning.", options: ["since","for","during","while"], answer: 0 },
  { q: "The students, together with their teacher, ______ attending the seminar.", options: ["are","were","is","have"], answer: 2 },
  { q: "The girl sings ______ than her elder sister.", options: ["beautifully","more beautifully","most beautifully","beautiful"], answer: 1 },
  { q: "If he ______ harder, he would have succeeded in the examination.", options: ["studied","studies","had studied","studying"], answer: 2 },
  { q: "Everyone in the hall ______ waiting for the programme to begin.", options: ["are","were","is","have"], answer: 2 },
  { q: "The lecturer explained the topic ______ so that everyone understood.", options: ["clear","clearly","clearer","clearest"], answer: 1 },
  { q: "Neither the principal nor the teachers ______ aware of the incident.", options: ["is","was","are","has"], answer: 2 },
  { q: "She ______ her project before the supervisor arrived.", options: ["completes","has completed","had completed","completing"], answer: 2 },
  { q: "The speech delivered by the chairman was ______ inspiring than we expected.", options: ["most","more","very","much"], answer: 1 },
  { q: "Mathematics ______ regarded as a difficult subject by many students.", options: ["are","were","is","have"], answer: 2 },
  { q: "The boy ______ to school every morning before sunrise.", options: ["walk","walks","walked","walking"], answer: 1 },
  { q: "I wish I ______ able to attend the conference yesterday.", options: ["am","was","were","be"], answer: 2 },
  { q: "The students ______ preparing for their final examinations.", options: ["is","are","was","has"], answer: 1 },
  { q: "Hardly had the meeting begun ______ the lights went out.", options: ["than","when","before","while"], answer: 1 },
  { q: "One of the boys ______ responsible for the broken window.", options: ["were","are","is","have"], answer: 2 },
  { q: "She has not finished her assignment, ______?", options: ["has she","hasn't she","did she","doesn't she"], answer: 0 },
  { q: "The girl looked ______ after hearing the announcement.", options: ["sadly","sadness","sad","saddest"], answer: 2 },
  { q: "Many a student ______ failed the test due to carelessness.", options: ["have","were","has","are"], answer: 2 },
  { q: "By this time next week, we ______ the project.", options: ["complete","will complete","will have completed","completed"], answer: 2 },
  { q: "The teacher and the student ______ discussing the problem.", options: ["is","was","are","has"], answer: 2 },
  { q: "She is the ______ intelligent student in the class.", options: ["more","most","very","much"], answer: 1 },
  { q: "Neither of the options ______ suitable for the experiment.", options: ["are","were","is","have"], answer: 2 },
  { q: "The baby ______ quietly in the cradle.", options: ["sleep","sleeps","slept","sleeping"], answer: 1 },
  { q: "If the weather improves, we ______ go for the excursion tomorrow.", options: ["will","would","shall have","had"], answer: 0 },
  { q: "The boy spoke ______ during the debate competition.", options: ["confident","confidently","confidence","more confident"], answer: 1 },
  { q: "A number of students ______ absent from the lecture yesterday.", options: ["is","has","are","was"], answer: 2 },
  { q: "The number of registered voters ______ increasing every year.", options: ["are","have","is","were"], answer: 2 },
  { q: "The audience ______ enjoying the performance.", options: ["is","was","are","have"], answer: 0 },
  { q: "She hardly visits her relatives, ______?", options: ["does she","doesn't she","did she","hasn't she"], answer: 0 },
  { q: "The teacher insisted that the boy ______ punished for his misconduct.", options: ["is","be","was","being"], answer: 1 },
  { q: "They ______ working on the project since last night.", options: ["are","were","have been","had"], answer: 2 },
  { q: "This road is ______ than the one we used yesterday.", options: ["narrow","narrower","narrowest","more narrow"], answer: 1 },
  { q: "Either the chairman or the members ______ responsible for the delay.", options: ["is","was","are","has"], answer: 2 },
  { q: "The news ______ surprising to everyone.", options: ["were","are","is","have"], answer: 2 },
  { q: "The athlete ran ______ than his opponent in the race.", options: ["fast","faster","fastest","more fast"], answer: 1 },
  { q: "If she ______ earlier, she would have met the principal.", options: ["arrived","arrives","had arrived","arriving"], answer: 2 },
  { q: "The boy and his friend ______ playing football in the field.", options: ["is","was","are","has"], answer: 2 },
  { q: "She ______ in this city for more than ten years.", options: ["lives","lived","has lived","living"], answer: 2 },
  { q: "I am invited to the ceremony, ______?", options: ["amn't I","aren't I","don't I","wasn't I"], answer: 1 },
  { q: "The explanation was ______ clear for everyone to understand.", options: ["too","so","very","much"], answer: 0 },
  { q: "Each of the participants ______ given a certificate.", options: ["were","are","was","have"], answer: 2 },
  { q: "The boy answered the question ______ in class.", options: ["correct","correctly","correctness","correcting"], answer: 1 },
  { q: "The team ______ determined to win the match.", options: ["are","have","is","were"], answer: 2 },
  { q: "She is ______ talented than her sister.", options: ["more","most","very","much"], answer: 0 },
  { q: "Neither the teacher nor the student ______ present at the meeting.", options: ["were","are","was","have"], answer: 2 },
];

const LETTERS = ['A','B','C','D'];
const TOTAL_TIME = 25 * 60;

let userName = '', current = 0, answers = [], timerInterval, secondsLeft, startSeconds;

function startQuiz() {
  const n = document.getElementById('nameInput').value.trim();
  if (!n) { document.getElementById('nameInput').focus(); return; }
  userName = n;
  answers = new Array(QUESTIONS.length).fill(null);
  current = 0;
  secondsLeft = TOTAL_TIME;
  startSeconds = TOTAL_TIME;
  showScreen('quizScreen');
  renderQuestion();
  startTimer();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  // re-trigger animation
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}

function startTimer() {
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  document.getElementById('timerDisplay').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  document.getElementById('timerBadge').classList.toggle('urgent', secondsLeft <= 120);
}

function renderQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('progressLabel').textContent = `Question ${current+1} of ${QUESTIONS.length}`;
  document.getElementById('questionNum').textContent = `Q${current+1}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('progressFill').style.width = `${((current+1)/QUESTIONS.length)*100}%`;

  const answered = answers.filter(a => a !== null).length;
  document.getElementById('answeredCount').textContent = `${answered} of ${QUESTIONS.length} answered`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = current === QUESTIONS.length - 1 ? 'Submit Quiz ✓' : 'Next →';
  nextBtn.classList.toggle('visible', answers[current] !== null);
}

function selectAnswer(i) {
  answers[current] = i;
  document.querySelectorAll('.option-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx === i);
    btn.querySelector('.option-letter').textContent = LETTERS[idx];
  });
  document.getElementById('nextBtn').classList.add('visible');
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('answeredCount').textContent = `${answered} of ${QUESTIONS.length} answered`;
}

function nextQuestion() {
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  clearInterval(timerInterval);
  const timeTaken = startSeconds - secondsLeft;
  const m = Math.floor(timeTaken / 60);
  const s = timeTaken % 60;

  let correct = 0, wrong = 0, skipped = 0;
  QUESTIONS.forEach((q, i) => {
    if (answers[i] === null) skipped++;
    else if (answers[i] === q.answer) correct++;
    else wrong++;
  });

  const pct = Math.round((correct / QUESTIONS.length) * 100);

  document.getElementById('resultName').textContent = userName;
  document.getElementById('resultHeadline').textContent =
    pct >= 80 ? 'Excellent work! 🎉' :
    pct >= 60 ? 'Good effort! 👏' :
    pct >= 40 ? 'Keep practising! 📚' : 'More study needed. 💪';

  document.getElementById('scoreBig').textContent = correct;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreMsg').textContent = `out of ${QUESTIONS.length} questions`;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkipped').textContent = skipped;
  document.getElementById('statTime').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  // Review list
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const userAns = answers[i];
    const isCorrect = userAns === q.answer;
    const isSkipped = userAns === null;
    const div = document.createElement('div');
    div.className = 'review-item ' + (isSkipped ? '' : isCorrect ? 'r-correct' : 'r-wrong');
    div.innerHTML = `
      <div class="review-q">Q${i+1}. ${q.q}</div>
      <div class="review-detail">
        Correct: <span class="c">${LETTERS[q.answer]}. ${q.options[q.answer]}</span>
        ${!isSkipped && !isCorrect ? ` &nbsp;·&nbsp; Your answer: <span class="w">${LETTERS[userAns]}. ${q.options[userAns]}</span>` : ''}
        ${isSkipped ? ' &nbsp;·&nbsp; <span style="color:var(--muted)">Skipped</span>' : ''}
      </div>`;
    list.appendChild(div);
  });

  showScreen('resultScreen');
}

function restartQuiz() {
  document.getElementById('nameInput').value = '';
  showScreen('startScreen');
}

// Enter key to start
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startQuiz();
});
</script>
</body>
</html>
